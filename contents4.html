    <ol class="breadcrumb container">
        <li><a href="index.html">トップ</a></li>
        <li>お問い合わせ</li>
    </ol>

    <article class="container">
        <h1 class="subhead">お問い合わせ</h1>
        
        <div class="single-box">
            <section>
                <h2>お問い合わせフォーム</h2>
                <p>四神飯店へのご意見、ご感想、ご質問などは、以下のフォームに必要事項をご記入の上、送信してください。</p>
                
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">お名前（必須）</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="四神 太郎" value="">
                </div>
    
                <div class="form-group">
                    <label for="email">メールアドレス（必須）</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="example@example.com" value="">
                </div>
    
                <div class="form-group">
                    <label for="message">お問い合わせ内容（必須）</label>
                    <textarea id="message" name="message" rows="6" class="form-control" required placeholder="こちらにお問い合わせ内容をご記入ください。" accesskey="M" tabindex="1">お問い合わせ内容</textarea>
                </div>
    
                <button type="submit" class="submit-btn" accesskey="S" tabindex="2">送信する</button>
            </form>

            </section>
        </div>
    </article>
